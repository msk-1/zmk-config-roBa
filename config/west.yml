# roBa 依存モジュール設定
# - zmk: ZMKファームウェア本体
# - zmk-pmw3610-driver: トラックボールドライバー
# - zmk-input-processor-temp-layer-threshold: オートマウスレイヤー（閾値対応）

manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: kumamuk-git
      url-base: https://github.com/kumamuk-git
    - name: yamaryu211
      url-base: https://github.com/yamaryu211
    - name: kot149
      url-base: https://github.com/kot149
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: v0.3-branch
      import: app/west.yml
    - name: zmk-pmw3610-driver
      remote: kumamuk-git
      revision: main
    - name: zmk-input-processor-temp-layer-threshold
      remote: yamaryu211
      revision: main
    - name: zmk-layout-shift
      remote: kot149
      revision: v1
  self:
    path: config
